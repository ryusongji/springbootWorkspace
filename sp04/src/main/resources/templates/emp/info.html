<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title></title>
<th:block th:replace="~{common/config/default_configs::BootstrapConfig}"></th:block>
</head>
<body>
	<div class="container text-center">
		<h3>사원 상세조회</h3>
		<div>
			<div>
				<label for="eid">사원번호</label>
				<input id="eid" type="text" th:value="${emp.employeeId}" readonly></input>
			</div>
			<div>
				<label for="ename">이름</label>
				<input id="ename" type="text" th:value="${emp.lastName}" readonly></input>
			</div>
			<div>
				<label for="email">이메일</label>
				<input id="email" type="email" th:value="${emp.email}" readonly></input>
			</div>
			<div>
				<label for="hdate">입사일</label>
				<input id="hdate" type="date" th:value="${#dates.format(emp.hireDate, 'yyyy-MM-dd')}" readonly></input>
			</div>
			<div>
				<label for="job">업무</label>
				<input id="job" type="text" th:value="${emp.jobId}" readonly></input>
			</div>
			<div>
				<label for="sal">급여</label>
				<input id="sal" type="number" step="0.01" th:value="${emp.salary}" readonly></input>
			</div>
			<div>
				<button type="button" class="btn btn-warning" th:onclick="|location.href='@{empUpdate(employeeId=${emp.employeeId})}'|">수정</button>
				<button type="button" class="btn btn-secondary" th:onclick="|location.href= '@{/empList}'|" >목록</button>
				<button type="button" class="btn btn-danger" th:onclick="|location.href='@{empDelete(empId=${emp.employeeId})}'|">삭제</button>
			</div>
		</div>
	</div>
</body>
</html>
